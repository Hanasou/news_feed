syntax = "proto3";

package userpb;
option go_package = "/userpb";

message User {
  string id       = 1;
  string username = 2;
  string email    = 3;
  string password = 4;
  // User role (e.g., "admin", "user")
  string role = 5;
}

message CreateUserRequest {
  User user = 1;
}

message CreateUserResponse {
  string response = 1;
}

message AuthenticateUserRequest {
  // Identifier can be either username or email
  string identifier = 1;
  string password   = 2;
}

message AuthenticateUserResponse {
  string access_token      = 1;
  string refresh_token     = 2;
  int64  expires_timestamp = 3;
  string token_type        = 4;
  User   user              = 5;
}

message GetUsersRequest {
  string id_filter    = 1;
  string name_filter  = 2;
  string email_filter = 3;
  string role_filter  = 4;
}

message GetUsersResponse {
  string        response = 1;
  repeated User users    = 2;
}

// UserService defines the user management operations.
service UserService {
  // Creates a new user with the provided information.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  // Authenticates a user and returns tokens upon successful authentication.
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);
  // Gets a list of users by provided filters
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
}